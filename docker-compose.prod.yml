# DWIGHT production stack: app + postgres + caddy reverse proxy.
# Usage:
#   1. Copy `.env.prod.example` to `.env.prod` and fill secrets.
#   2. docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build
# Caddy auto-issues Let's Encrypt certs for ${PUBLIC_HOST}.

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - dwight-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      AUTH_SECRET: ${AUTH_SECRET}
      ORIGIN: https://${PUBLIC_HOST}
      PROTOCOL_HEADER: x-forwarded-proto
      HOST_HEADER: x-forwarded-host
      BODY_SIZE_LIMIT: '5M'
    depends_on:
      db:
        condition: service_healthy
    expose:
      - '3000'

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      PUBLIC_HOST: ${PUBLIC_HOST}
    depends_on:
      - app

volumes:
  dwight-pgdata:
  caddy-data:
  caddy-config:
