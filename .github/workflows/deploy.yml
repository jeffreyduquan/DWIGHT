name: build-and-deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check
      - run: pnpm vitest run

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3
      - name: Compute lowercase image name
        run: echo "IMAGE=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          ADMIN_SECRET: ${{ secrets.ADMIN_SECRET }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: ADMIN_SECRET
          script: |
            cd /opt/dwight
            # Pull latest code (docker-compose, Dockerfile, etc.)
            git pull
            # Inject ADMIN_SECRET into .env.prod (add or update the line)
            grep -q '^ADMIN_SECRET=' .env.prod \
              && sed -i "s|^ADMIN_SECRET=.*|ADMIN_SECRET=${ADMIN_SECRET}|" .env.prod \
              || echo "ADMIN_SECRET=${ADMIN_SECRET}" >> .env.prod
            # Ensure DB is up before running migrations
            docker compose -f docker-compose.prod.yml --env-file .env.prod up -d db
            # Wait until db is healthy
            for i in $(seq 1 30); do
              docker compose -f docker-compose.prod.yml --env-file .env.prod exec -T db pg_isready -U "$(grep ^POSTGRES_USER= .env.prod | cut -d= -f2)" >/dev/null 2>&1 && break
              sleep 1
            done
            # Apply pending SQL migrations idempotently (all *.sql in drizzle/, ordered by filename)
            POSTGRES_USER=$(grep ^POSTGRES_USER= .env.prod | cut -d= -f2)
            POSTGRES_DB=$(grep ^POSTGRES_DB= .env.prod | cut -d= -f2)
            for f in $(ls drizzle/*.sql | sort); do
              echo "Applying migration: $f"
              docker compose -f docker-compose.prod.yml --env-file .env.prod exec -T db psql -v ON_ERROR_STOP=1 -U "$POSTGRES_USER" -d "$POSTGRES_DB" < "$f" || echo "  -> skipped (already applied / non-idempotent)"
            done
            # Rebuild app image from latest code and restart
            docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build
            # Smoke test
            sleep 5
            curl -fsS http://127.0.0.1/healthz || exit 1
